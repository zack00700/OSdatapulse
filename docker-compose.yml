version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: datapulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
volumes:
  pgdata:
